services:
  db:
    image: postgres:17-alpine
    container_name: eventosvivos-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventosvivos}
      POSTGRES_USER: ${POSTGRES_USER:-eventosvivos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventosvivos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - eventosvivos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventosvivos} -d ${POSTGRES_DB:-eventosvivos}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  eventosvivos-postgres:
